<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error_login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
    <style>
        #errorContainer {
            position: absolute;
            top: 370px;
            width: 320px;
            left: 50%;
            bottom: -100px; /* Adjusted spacing below form */
            transform: translateX(-50%);
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <a href="home.html">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="VoiceBridge">
            </a>
        </div>
        <ul class="nav-links-login">
            <li><a href="about.html">About Us</a></li>
            <li><a href="#" class="active">Login</a></li>
            <li><a href="reg.html">Register</a></li>
        </ul>
    </nav>

    <!-- Login Form -->
    <div class="glass-container">
        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username" class="login-label">Username or Email</label>
                <input type="text" id="username" name="username" required placeholder="Enter username or email">
                <input type="password" id="password" name="password" required placeholder="Password">
                
                <div class="options">
                    <label>
                        <input type="checkbox" id="remember" name="remember"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
                
                <button type="submit">Login</button>

                <p>Don't have an account? <a href="reg.html" id="register">Register</a></p>
            </form>
            <!-- Error Container for Floating Messages -->
            <div id="errorContainer"></div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
